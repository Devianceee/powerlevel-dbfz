services:
  postgres:
    image: postgres:17
    container_name: powerlevel-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: powerlevel
      POSTGRES_USER: powerlevel
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: powerlevel-app
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: powerlevel
      DB_PASSWORD: password
      DB_NAME: powerlevel

    depends_on:
      - postgres

volumes:
  postgres-data: