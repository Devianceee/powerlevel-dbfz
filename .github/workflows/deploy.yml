name: Docker Production Deployment

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: devianceee/powerlevel-dbfz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy Compose and Provisioning Scripts to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Copy BOTH the compose blueprint and the initialization scripts
          source: "docker-compose.yml,scripts/provision.sh"
          target: "/tmp/deploy"

      - name: Execute Server Operations via SSH
        uses: appleboy/scp-action@v0.1.7
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DBFZ_STEAM_ID: ${{ vars.DBFZ_STEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: R2_ACCESS_KEY_ID,R2_SECRET_KEY,R2_ACCOUNT_ID,DBFZ_STEAM_ID,IMAGE_NAME,GH_TOKEN,GH_ACTOR
          script: |
            LOW_IMAGE=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
            
            # Move docker-compose.yml to its permanent deployment home
            sudo mkdir -p /opt/powerlevel
            sudo mv /tmp/deploy/docker-compose-production.yml /opt/powerlevel/docker-compose.yml || sudo mv /tmp/deploy/docker-compose.yml /opt/powerlevel/docker-compose.yml
            
            # Execute provisioning script configurations
            chmod +x /tmp/deploy/scripts/provision.sh
            IMAGE_NAME=$LOW_IMAGE sudo -E /tmp/deploy/scripts/provision.sh
            
            # Authenticate host Docker to access your private GHCR image packages
            echo "$GH_TOKEN" | sudo docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            
            # Force pull fresh image assets and tell Systemd to trigger the compose layers
            cd /opt/powerlevel
            sudo docker compose pull
            sudo systemctl restart powerlevel.service
            
            # Cleanup temp artifacts
            rm -rf /tmp/deploy