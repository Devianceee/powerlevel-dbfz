name: Docker Production Deployment

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy Compose and Provisioning Scripts to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,scripts/provision.sh"
          target: "/tmp/deploy"

      - name: Execute Server Operations via SSH
        uses: appleboy/ssh-action@v1
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DBFZ_STEAM_ID: ${{ vars.DBFZ_STEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          envs: R2_ACCESS_KEY_ID,R2_SECRET_KEY,R2_ACCOUNT_ID,DBFZ_STEAM_ID,IMAGE_NAME,GH_TOKEN,GH_ACTOR

          script: |
            set -e

            LOW_IMAGE=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')

            echo "Deploying image: ghcr.io/$LOW_IMAGE:latest"

            sudo mkdir -p /opt/powerlevel

            sudo mv /tmp/deploy/docker-compose.yml /opt/powerlevel/docker-compose.yml

            sudo tee /opt/powerlevel/.env > /dev/null <<EOF
            IMAGE_NAME=$LOW_IMAGE
            DBFZ_STEAM_ID=$DBFZ_STEAM_ID
            R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
            R2_SECRET_KEY=$R2_SECRET_KEY
            R2_ACCOUNT_ID=$R2_ACCOUNT_ID
            EOF

            echo "Running provisioning..."

            chmod +x /tmp/deploy/scripts/provision.sh

            sudo \
              R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
              R2_SECRET_KEY="$R2_SECRET_KEY" \
              R2_ACCOUNT_ID="$R2_ACCOUNT_ID" \
              IMAGE_NAME="$LOW_IMAGE" \
              DBFZ_STEAM_ID="$DBFZ_STEAM_ID" \
              /tmp/deploy/scripts/provision.sh

            echo "Logging into GHCR..."

            echo "$GH_TOKEN" | sudo docker login ghcr.io \
              -u "$GH_ACTOR" \
              --password-stdin

            echo "Starting containers..."

            cd /opt/powerlevel

            sudo docker compose config

            sudo docker compose pull

            sudo docker compose up -d --remove-orphans

            echo "Deployment complete"

            rm -rf /tmp/deploy