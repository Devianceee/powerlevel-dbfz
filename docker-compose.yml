services:
  postgres:
    image: postgres:17
    container_name: powerlevel-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: powerlevel
      POSTGRES_USER: powerlevel
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: