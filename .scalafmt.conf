version = "3.8.3"
runner.dialect = scala3
maxColumn = 180

# FORCE NEWLINE BEFORE MULTILINE FOR/BLOCKS:
# If the method body spans multiple lines (like a for-comprehension),
# this forces it to start on a new line rather than being sucked into the def line.
newlines.beforeMultilineDef = unfold

# Vertically aligns '=' signs for consecutive vals/vars
align.preset = more

# Standard 2-space indentation
indent.main = 2
indent.callSite = 2
indent.defnSite = 2

# Keeps closing parens on their own line for multiline blocks
danglingParentheses.preset = true